<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    QR Packing Scanner
  </title>

  <link
    rel="stylesheet"
    href="../output.css"
  >

</head>

<body class="bg-gray-100 min-h-screen pb-24">

  <header class="bg-white p-4 shadow">

      QR Packing Scanner

    </h1>

    </p>

  <main class="p-4 space-y-4">

    <div class="bg-white rounded-2xl p-4 shadow">

      <div

    </div>

    <div

      class="space-y-4"

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg">

    <div class="grid grid-cols-5 text-center">

      <a

        class="p-3 text-gray-500"

      </a>

      <a
        href="measurements.html"
        class="p-3 text-gray-500"
      >

        Measure

      </a>

      <a
        href="packing.html"
        class="p-3 text-gray-500"
      >

        Packing

      </a>

      <a
        href="scan-packing.html"
        class="p-3 text-brand-primary font-bold"
      >

        Scan

      </a>

      <a
        href="delivery.html"
        class="p-3 text-gray-500"

        Delivery

      </a>

    </div>

  <script src="./scan-packing.js"></script>
